<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill:#fff8e1; stroke:#b8860b; stroke-width:2 }
    .title { font: bold 14px sans-serif; fill:#333 }
    .field { font: 12px monospace; fill:#222 }
    .heading { font: bold 16px sans-serif; fill:#b8860b }
  </style>
  <rect x="20" y="20" width="1160" height="60" class="box"/>
  <text x="40" y="55" class="heading">Ecommerce - ER Diagram (Base model with enhancements)</text>

  <!-- Users -->
  <rect x="40" y="100" width="300" height="140" class="box"/>
  <text x="60" y="125" class="title">USUARIOS (users)</text>
  <text x="60" y="145" class="field">id PK</text>
  <text x="60" y="165" class="field">nombre / name</text>
  <text x="60" y="185" class="field">email UNIQUE</text>
  <text x="60" y="205" class="field">password, preferred_locale, timestamps</text>

  <!-- Roles -->
  <rect x="380" y="100" width="260" height="100" class="box"/>
  <text x="400" y="125" class="title">ROLES (roles)</text>
  <text x="400" y="145" class="field">id PK</text>
  <text x="400" y="165" class="field">nombre UNIQUE</text>

  <!-- role_user -->
  <rect x="680" y="100" width="220" height="80" class="box"/>
  <text x="700" y="125" class="title">ROLE_USER (pivot)</text>
  <text x="700" y="145" class="field">rol_id FK</text>
  <text x="700" y="165" class="field">usuario_id FK</text>

  <!-- Products -->
  <rect x="40" y="280" width="340" height="160" class="box"/>
  <text x="60" y="305" class="title">PRODUCTOS (products)</text>
  <text x="60" y="325" class="field">id PK</text>
  <text x="60" y="345" class="field">nombre, descripcion</text>
  <text x="60" y="365" class="field">price_cents, stock, activo, images</text>

  <!-- Categories -->
  <rect x="420" y="280" width="320" height="140" class="box"/>
  <text x="440" y="305" class="title">CATEGORIAS (categories)</text>
  <text x="440" y="325" class="field">id PK</text>
  <text x="440" y="345" class="field">nombre, descripcion, parent_id</text>

  <!-- category_product pivot -->
  <rect x="760" y="300" width="320" height="80" class="box"/>
  <text x="780" y="325" class="title">CATEGORY_PRODUCT (pivot)</text>
  <text x="780" y="345" class="field">categoria_id FK</text>
  <text x="780" y="365" class="field">producto_id FK</text>

  <!-- Favorites pivot -->
  <rect x="40" y="480" width="300" height="80" class="box"/>
  <text x="60" y="505" class="title">FAVORITOS (favorites)</text>
  <text x="60" y="525" class="field">usuario_id FK</text>
  <text x="60" y="545" class="field">producto_id FK</text>

  <!-- Carts & Cart lines -->
  <rect x="380" y="480" width="320" height="110" class="box"/>
  <text x="400" y="505" class="title">CARRITOS (carts)</text>
  <text x="400" y="525" class="field">id PK</text>
  <text x="400" y="545" class="field">usuario_id (nullable), session_id</text>
  <text x="400" y="565" class="field">cart_lines -> cart_lines table</text>

  <!-- Orders & Lines -->
  <rect x="40" y="620" width="600" height="160" class="box"/>
  <text x="60" y="645" class="title">PEDIDOS (orders) & LINEAS_PEDIDO (order_lines)</text>
  <text x="60" y="665" class="field">orders: id PK, usuario_id FK, direccion_id FK, descuento_id FK, estado, precio_total_cents, fecha, status_id FK</text>
  <text x="60" y="685" class="field">order_lines: id PK, pedido_id FK, producto_id FK, cantidad, precio_unitario_cents</text>

  <!-- Invoices, Payments, Discounts, Product images -->
  <rect x="680" y="620" width="420" height="160" class="box"/>
  <text x="700" y="645" class="title">FACTURAS / PAYMENTS / DISCOUNTS / IMAGES</text>
  <text x="700" y="665" class="field">invoices: pedido_id FK, datos fiscales, impuestos</text>
  <text x="700" y="685" class="field">payments: pedido_id FK, metodo, amount_cents, status, provider_ref</text>
  <text x="700" y="705" class="field">discounts: codigo, porcentaje, fecha_caducidad</text>
  <text x="700" y="725" class="field">product_images: producto_id FK, path, orden</text>

  <!-- footer note -->
  <text x="40" y="820" class="field">Note: Relaciones 1:1 (users-profiles optional), 1:N (users-orders), N:M (products-categories, users-roles, users-favorites)</text>
</svg>
